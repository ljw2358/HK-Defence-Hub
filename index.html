<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK-Defence-Hub | Global Strategy</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #050505; color: #e0e0e0; margin: 0; line-height: 1.6; }
        .container { width: 90%; max-width: 1000px; margin: auto; padding: 50px 0; }
        header { border-bottom: 2px solid #1a1a1a; padding: 20px 0; text-align: center; }
        h1 { color: #00aaff; font-size: 2.5rem; }
        .hero { text-align: center; padding: 60px 0; }
        .vision-box { background: #111; padding: 30px; border-left: 5px solid #00aaff; margin: 30px 0; }
        .lang-selector { margin: 20px 0; text-align: center; }
        select { background: #222; color: #00aaff; padding: 10px; border: 1px solid #444; width: 250px; font-size: 16px; cursor: pointer; }
        footer { text-align: center; font-size: 0.8rem; color: #555; margin-top: 50px; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>HK-Defence-Hub</h1>
            <div class="lang-selector">
                <select id="lang" onchange="updateContent(this.value)">
                    <option value="ko">한국어</option>
                    <option value="en">English</option>
                    <option value="zh">中文</option>
                    <option value="ar">العربية</option>
                    <option value="hi">हिन्दी</option>
                    <option value="es">Español</option>
                    <option value="pt">Português (Brasil)</option>
                    <option value="uk">Українська</option>
                    <option value="ja">日本語</option>
                    <option value="ru">Русский</option>
                    <option value="vi">Tiếng Việt</option>
                    <option value="th">ภาษาไทย</option>
                    <option value="id">Bahasa Indonesia</option>
                </select>
            </div>
        </div>
    </header>

    <div class="container">
        <section class="hero">
            <h2 id="title">방산과 로봇, 미래 전략의 중심</h2>
            <p id="desc">AI 기반 방산 기술과 휴머노이드 로봇 생태계의 융합 전략 허브.</p>
        </section>

        <div class="vision-box">
            <h3 id="vision">핵심 비전</h3>

        </div>
    </div>

    <footer>
        &copy; 2026 HK-Defence-Hub. All Rights Reserved.
    </footer>

            ru: { title: "Центр оборонных и робототехнических стратегий", desc: "Стратегический центр по изучению интеграции оборонных ИИ-технологий и робототехники.", vision: "Основное видение", vDesc: "Мы захватываем «мозг» оборонных роботов с помощью ОС OpenMind." },
            vi: { title: "Trung tâm Chiến lược Quốc phòng và Robot", desc: "Trung tâm chiến lược về sự hợp nhất công nghệ quốc phòng AI và robot.", vision: "Tầm nhìn cốt lõi", vDesc: "Chúng tôi nắm quyền kiểm soát 'bộ não' của robot phòng thủ thông qua OpenMind OS." },

        function updateContent(lang) {
            const t = translations[lang];
            document.getElementById('title').innerText = t.title;
            document.getElementById('desc').innerText = t.desc;
            document.getElementById('vision').innerText = t.vision;
            document.getElementById('vision-desc').innerText = t.vDesc;
        }
    </script>
</body>
</html>
